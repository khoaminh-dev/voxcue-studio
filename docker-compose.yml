version: '3.8'

services:
  voxcue-studio:
    build: .
    container_name: voxcue-studio
    restart: unless-stopped
    networks:
      - traefik_network
    labels:
      - "traefik.enable=true"
      # Router settings
      - "traefik.http.routers.voxcue-studio.rule=Host(`voxcue.bkuteam.site`)"
      - "traefik.http.routers.voxcue-studio.entrypoints=websecure"
      - "traefik.http.routers.voxcue-studio.tls.certresolver=letsencrypt" # Adjust to match your SANKIT Traefik config
      # Service settings
      - "traefik.http.services.voxcue-studio.loadbalancer.server.port=80"
      
networks:
  traefik_network:
    external: true # Adjust to match your existing Traefik network name
